<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive English Flashcards - GMOs</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #2ecc71;
            --secondary: #3498db;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        #game-container {
            width: 90%;
            max-width: 600px;
            text-align: center;
        }
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 450px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 20px;
        }
        .card.is-flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            background: white;
            padding: 20px;
            box-sizing: border-box;
        }
        .card-back {
            transform: rotateY(180deg);
            background-color: var(--primary);
            color: white;
        }
        .card-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 4px solid var(--light);
        }
        .phrase-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--dark);
        }
        .card-back .phrase-text {
            color: white;
            font-size: 1.4rem;
        }
        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }
        button {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            background-color: var(--dark);
            color: white;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #next-btn {
            background-color: var(--secondary);
        }
        #final-screen {
            display: none;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 10px;
            width: 80%;
        }
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="progress">Card 1 / 34</div>
    <div class="card-container" onclick="flipCard()">
        <div id="main-card" class="card">
            <div class="card-face card-front">
                <img id="front-img" class="card-image" src="" alt="Vocabulary Image">
                <div id="front-text" class="phrase-text"></div>
            </div>
            <div class="card-face card-back">
                <div id="back-text" class="phrase-text"></div>
            </div>
        </div>
    </div>
    <div class="controls">
        <button id="next-btn" onclick="nextCard()" disabled>Siguiente →</button>
    </div>
</div>

<div id="final-screen">
    <h1>GAME OVER</h1>
    <p>¡Increíble trabajo aprendiendo sobre OGM!</p>
    <input type="text" id="user-name" placeholder="Ingresa tu nombre">
    <button onclick="saveParticipant()">Registrar mi participación</button>
    
    <h3>Listado de Participantes</h3>
    <table id="participants-table">
        <thead>
            <tr><th>Nombre</th><th>Fecha</th></tr>
        </thead>
        <tbody id="participants-list"></tbody>
    </table>
    <button onclick="location.reload()" style="margin-top: 20px;">Reiniciar Juego</button>
</div>

<script>
    const vocabulary = [
        { en: "GMOs food", es: "Alimentos OGM", img: "https://images.unsplash.com/photo-1615485290382-441e4d0c9cb5?auto=format&fit=crop&w=600&q=80" },
        { en: "insert additional gene material from a bacterium", es: "insertar material genético adicional de una bacteria", img: "https://images.unsplash.com/photo-1581093588401-fbb62a02f120?auto=format&fit=crop&w=600&q=80" },
        { en: "could be capable of destroying certain types of caterpillars or insects into a plant", es: "podría ser capaz de destruir ciertos tipos de orugas o insectos en una planta", img: "https://images.unsplash.com/photo-1525450824201-9f75727181f3?auto=format&fit=crop&w=600&q=80" },
        { en: "it sound like a science experiment from the future", es: "suena como un experimento científico del futuro", img: "https://images.unsplash.com/photo-1518152006812-edab29b069ac?auto=format&fit=crop&w=600&q=80" },
        { en: "It’s happening today in genetically-modified foods", es: "Está sucediendo hoy en los alimentos genéticamente modificados", img: "https://images.unsplash.com/photo-1530507629858-e4977d30e9e0?auto=format&fit=crop&w=600&q=80" },
        { en: "What do we eat?", es: "¿Qué comemos?", img: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=600&q=80" },
        { en: "Most of the world’s food and feed (what is given to animals)", es: "La mayor parte de la comida y el forraje del mundo (lo que se da a los animales)", img: "https://images.unsplash.com/photo-1516467508483-a7212febe31a?auto=format&fit=crop&w=600&q=80" },
        { en: "it is made with plants that humans have grown for thousands of years", es: "está hecho con plantas que los humanos han cultivado durante miles de años", img: "https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?auto=format&fit=crop&w=600&q=80" },
        { en: "GMO is food that has been altered at a cellular level", es: "OGM es comida que ha sido alterada a nivel celular", img: "https://images.unsplash.com/photo-1576086213369-97a306d36557?auto=format&fit=crop&w=600&q=80" },
        { en: "by inserting gene material from another organism into the plant", es: "insertando material genético de otro organismo en la planta", img: "https://images.unsplash.com/photo-1582719508461-905c673771fd?auto=format&fit=crop&w=600&q=80" },
        { en: "The desired characteristics or traits could then be beed into the next generation of crop or plant", es: "Las características o rasgos deseados podrían entonces ser transmitidos a la siguiente generación del cultivo o planta", img: "https://images.unsplash.com/photo-1500937386664-56d1dfef3854?auto=format&fit=crop&w=600&q=80" },
        { en: "Supporters say that GMO foods", es: "Los defensores dicen que los alimentos OGM", img: "https://images.unsplash.com/photo-1464226184884-fa280b87c399?auto=format&fit=crop&w=600&q=80" },
        { en: "GMO foods need fewer pesticides less water and less fertilizer", es: "los alimentos OGM necesitan menos pesticidas menos agua y menos fertilizante", img: "https://images.unsplash.com/photo-1592982537447-7440770cbfc9?auto=format&fit=crop&w=600&q=80" },
        { en: "to produce higher yields be grown in poor soil or hot dry climate conditions", es: "para producir mayores rendimientos cultivarse en suelos pobres o condiciones climáticas calurosas y secas", img: "https://images.unsplash.com/photo-1470058869958-2a77a6171242?auto=format&fit=crop&w=600&q=80" },
        { en: "Many studies over the last forty years show that GMOs are safe", es: "Muchos estudios de los últimos cuarenta años muestran que los OGM son seguros", img: "https://images.unsplash.com/photo-1532187875605-7fe35803d46a?auto=format&fit=crop&w=600&q=80" },
        { en: "Some GMOs are more nutritious", es: "Algunos OGM son más nutritivos", img: "https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=600&q=80" },
        { en: "One type of genetically modified rice contains as much vitamin A as spinach", es: "Un tipo de arroz genéticamente modificado contiene tanta vitamina A como la espinaca", img: "https://images.unsplash.com/photo-1586201375761-83865001e31c?auto=format&fit=crop&w=600&q=80" },
        { en: "This might not seem like a big deal", es: "Esto puede no parecer gran cosa", img: "https://images.unsplash.com/photo-1507034832389-a860101a8f8e?auto=format&fit=crop&w=600&q=80" },
        { en: "people living in developing countries facing malnutrition blindness and even death", es: "personas que viven en países en desarrollo que enfrentan desnutrición ceguera e incluso la muerte", img: "https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?auto=format&fit=crop&w=600&q=80" },
        { en: "a lack of vitamin A", es: "una falta de vitamina A", img: "https://images.unsplash.com/photo-1523413363574-c3c444a1183d?auto=format&fit=crop&w=600&q=80" },
        { en: "such foods could become life-changing and even life-saving", es: "tales alimentos podrían volverse transformadores e incluso salvar vidas", img: "https://images.unsplash.com/photo-1505751172876-fa1923c5c528?auto=format&fit=crop&w=600&q=80" },
        { en: "they argue that it could help solve the world’s hunger problem", es: "argumentan que podría ayudar a resolver el problema del hambre en el mundo", img: "https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?auto=format&fit=crop&w=600&q=80" },
        { en: "many countries in which people face chronic hunger have banned GMOs", es: "muchos países en los que la gente padece hambre crónica han prohibido los OGM", img: "https://images.unsplash.com/photo-1534131707746-25d604851a1f?auto=format&fit=crop&w=600&q=80" },
        { en: "they have implemented strict procedures for growing GMO crops", es: "han implementado procedimientos estrictos para el cultivo de OGM", img: "https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?auto=format&fit=crop&w=600&q=80" },
        { en: "Some point to several studies that show that these might cause serious health problems", es: "Algunos señalan varios estudios que muestran que estos podrían causar problemas de salud graves", img: "https://images.unsplash.com/photo-1579154204601-01588f351e67?auto=format&fit=crop&w=600&q=80" },
        { en: "cancer developmental delays or infertility", es: "cáncer retrasos en el desarrollo o infertilidad", img: "https://images.unsplash.com/photo-1559757175-5700dde675bc?auto=format&fit=crop&w=600&q=80" },
        { en: "Even so, most European countries have banned all or at least some GMO foods", es: "Aun así la mayoría de los países europeos han prohibido todos o al menos algunos alimentos OGM", img: "https://images.unsplash.com/photo-1526778548025-fa2f459cd5ca?auto=format&fit=crop&w=600&q=80" },
        { en: "many countries in Asia and Africa have banned GMO foods", es: "muchos países de Asia y África han prohibido los alimentos OGM", img: "https://images.unsplash.com/photo-1528080209633-59a99bc79ec4?auto=format&fit=crop&w=600&q=80" },
        { en: "even though", es: "a pesar de que", img: "https://images.unsplash.com/photo-1454496522488-7a8e488e8606?auto=format&fit=crop&w=600&q=80" },
        { en: "people in these countries are in desperate need of food", es: "la población de estos países tiene una necesidad desesperada de alimentos", img: "https://images.unsplash.com/photo-1469571486292-0ba58a3f068b?auto=format&fit=crop&w=600&q=80" },
        { en: "they grow the vast majority of the world’s GMO foods", es: "cultivan la gran mayoría de los alimentos OGM del mundo", img: "https://images.unsplash.com/photo-1523741543316-beb7fc7023d8?auto=format&fit=crop&w=600&q=80" }
    ];

    let currentIdx = 0;
    let flipped = false;

    function speak(text, lang) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = lang;
        msg.rate = 0.9; // Pronunciación clara
        window.speechSynthesis.speak(msg);
    }

    function updateCard() {
        const item = vocabulary[currentIdx];
        document.getElementById('front-img').src = item.img;
        document.getElementById('front-text').innerText = item.en;
        document.getElementById('back-text').innerText = item.es;
        document.getElementById('progress').innerText = `Card ${currentIdx + 1} / ${vocabulary.length}`;
        document.getElementById('main-card').classList.remove('is-flipped');
        document.getElementById('next-btn').disabled = true;
        flipped = false;
        
        // Auto-pronunciación al cargar
        speak(item.en, 'en-US');
    }

    function flipCard() {
        const card = document.getElementById('main-card');
        card.classList.toggle('is-flipped');
        const item = vocabulary[currentIdx];
        
        if (!flipped) {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            flipped = true;
            document.getElementById('next-btn').disabled = false;
        }

        // Pronunciar según la cara visible
        if (card.classList.contains('is-flipped')) {
            speak(item.es, 'es-MX');
        } else {
            speak(item.en, 'en-US');
        }
    }

    function nextCard() {
        if (currentIdx < vocabulary.length - 1) {
            currentIdx++;
            updateCard();
        } else {
            showFinalScreen();
        }
    }

    function showFinalScreen() {
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('final-screen').style.display = 'block';
        loadParticipants();
    }

    function saveParticipant() {
        const name = document.getElementById('user-name').value;
        if (!name) return alert("Por favor ingresa tu nombre");
        
        const participants = JSON.parse(localStorage.getItem('gmo_participants') || '[]');
        participants.push({ name: name, date: new Date().toLocaleDateString() });
        localStorage.setItem('gmo_participants', JSON.stringify(participants));
        
        document.getElementById('user-name').value = '';
        loadParticipants();
    }

    function loadParticipants() {
        const list = document.getElementById('participants-list');
        const participants = JSON.parse(localStorage.getItem('gmo_participants') || '[]');
        list.innerHTML = participants.map(p => `<tr><td>${p.name}</td><td>${p.date}</td></tr>`).join('');
    }

    // Inicializar
    updateCard();
</script>
</body>
</html>
